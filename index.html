<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Fashion Photography Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    @keyframes fade-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-fade-in {
      animation: fade-in 0.3s ease-out forwards;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, rgba(245, 158, 11, 0.07), transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    /* Custom scrollbar for a more polished look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5);
      /* bg-slate-800/50 */
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      /* bg-slate-600 */
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748B;
      /* bg-slate-500 */
    }

    /* Styles for Image Comparator */
    .comparator-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 0.75rem;
      /* rounded-lg */
      background-color: #0f172a;
      /* bg-slate-900 */
    }

    .comparator-image-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .comparator-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .comparator-label {
      position: absolute;
      bottom: 1rem;
      padding: 0.25rem 0.75rem;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 9999px;
      pointer-events: none;
    }

    .comparator-label.before {
      left: 1rem;
    }

    .comparator-label.after {
      right: 1rem;
    }

    .comparator-slider {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: ew-resize;
      z-index: 10;
    }

    .comparator-handle {
      position: absolute;
      top: 0;
      left: 50%;
      width: 4px;
      height: 100%;
      background: white;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .comparator-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 44px;
      height: 44px;
      background-color: rgba(30, 41, 59, 0.8);
      /* slate-800/80 */
      border: 2px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='2' stroke='white'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' d='M15 19l-7-7 7-7M9 5l7 7-7 7' /%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 60%;
    }

    .comparator-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 4px;
      height: 100%;
      background: transparent;
      cursor: ew-resize;
    }

    .comparator-slider::-moz-range-thumb {
      width: 4px;
      height: 100%;
      background: transparent;
      cursor: ew-resize;
      border: none;
    }

    /* Custom Styles for Range Input */
    input[type="range"]:not(.comparator-slider) {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #334155;
      /* bg-slate-700 */
      border-radius: 3px;
      outline: none;
      opacity: 0.7;
      transition: opacity .2s;
    }

    input[type="range"]:not(.comparator-slider):hover {
      opacity: 1;
    }

    input[type="range"]:not(.comparator-slider)::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #F59E0B;
      /* amber-500 */
      cursor: pointer;
      border-radius: 50%;
      border: 2px solid #F1F5F9;
      /* slate-100 */
    }

    input[type="range"]:not(.comparator-slider)::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #F59E0B;
      /* amber-500 */
      cursor: pointer;
      border-radius: 50%;
      border: 2px solid #F1F5F9;
      /* slate-100 */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.1.1",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.17.0",
    "lodash": "https://aistudiocdn.com/lodash@^4.17.21",
    "axios": "https://aistudiocdn.com/axios@^1.7.2"
  }
}
</script>
  <!-- Google Identity Services for OAuth -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="bg-slate-950 text-slate-200" style="font-family: 'Be Vietnam Pro', sans-serif;">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
