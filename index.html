<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Fashion Photography Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    @keyframes fade-in {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-fade-in {
      animation: fade-in 0.3s ease-out forwards;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.16);
      border-radius: 9999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.26);
    }

    .comparator-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 1rem;
      background-color: #09090b;
    }

    .comparator-image-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .comparator-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }

    .comparator-label {
      position: absolute;
      bottom: 1rem;
      padding: 0.25rem 0.75rem;
      background-color: rgba(0, 0, 0, 0.62);
      color: white;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border-radius: 9999px;
      pointer-events: none;
    }

    .comparator-label.before {
      left: 1rem;
    }

    .comparator-label.after {
      right: 1rem;
    }

    .comparator-slider {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: ew-resize;
      z-index: 10;
    }

    .comparator-handle {
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      background: rgba(255, 255, 255, 0.82);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 5;
    }

    .comparator-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 44px;
      height: 44px;
      background-color: rgba(9, 9, 11, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke-width='2' stroke='white'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' d='M15 19l-7-7 7-7M9 5l7 7-7 7' /%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 60%;
    }

    .comparator-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 4px;
      height: 100%;
      background: transparent;
      cursor: ew-resize;
    }

    .comparator-slider::-moz-range-thumb {
      width: 4px;
      height: 100%;
      background: transparent;
      cursor: ew-resize;
      border: none;
    }

    input[type="range"]:not(.comparator-slider) {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 9999px;
      outline: none;
      opacity: 0.85;
      transition: opacity .2s ease;
    }

    input[type="range"]:not(.comparator-slider):hover {
      opacity: 1;
    }

    input[type="range"]:not(.comparator-slider)::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #f4f4f2;
      cursor: pointer;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.35);
    }

    input[type="range"]:not(.comparator-slider)::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #f4f4f2;
      cursor: pointer;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.35);
    }
  </style>
